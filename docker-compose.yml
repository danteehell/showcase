services:
  db:
    image: postgres:16

    container_name: showcase_db

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: ./backend

    container_name: showcase_backend

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - ./backend:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db

volumes:
  postgres_data: